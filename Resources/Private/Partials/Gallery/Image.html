<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:ot="http://typo3.org/ns/OliverThiele/OtGallery/ViewHelpers"
      data-namespace-typo3-fluid="true">

<figure class="ot-gallery-figure">

    <f:if condition="{gallery.aspectRatioCss}">
        <f:then>
    <div class="ot-gallery-media" style="--ot-gallery-ratio: {gallery.aspectRatioCss}; --ot-gallery-rendering: {gallery.flex.rendering}">
        </f:then>
        <f:else>
    <div class="ot-gallery-media">
        </f:else>
    </f:if>

        <f:if condition="{gallery.flex.lightbox}">
        <f:then>
        <a href="{image.publicUrl}"
           data-fancybox="gallery-{data.uid}"
           data-caption="{ot:lightboxCaption(image: image, fields: gallery.lightboxCaptionFields)}"
           class="ot-gallery-link"
           aria-label="{f:translate(key: 'LLL:EXT:ot_gallery/Resources/Private/Language/locallang.xlf:gallery.openImage')}: {image.properties.title}">
        </f:then>
        <f:else>
        <a href="{image.publicUrl}"
           class="ot-gallery-link"
           target="_blank"
           rel="noopener"
           aria-label="{f:translate(key: 'LLL:EXT:ot_gallery/Resources/Private/Language/locallang.xlf:gallery.openImage')}: {image.properties.title}">
        </f:else>
        </f:if>

            <img srcset="{ot:gallerySrcset(image: image, widths: gallery.imageWidths)}"
                 sizes="{gallery.sizesAttribute}"
                 src="{f:uri.image(image: image, width: gallery.imageWidths.xxl, fileExtension: 'webp')}"
                 alt="{image.properties.alternative}"
                 title="{image.properties.title}"
                 loading="lazy"
                 class="ot-gallery-img img-fluid w-100" />

            <span class="ot-gallery-overlay" aria-hidden="true">
                <span class="ot-gallery-icon ot-gallery-icon-zoom">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
                        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </span>
            </span>
        </a>

    </div>

    <f:if condition="{gallery.flex.enableDownload} || ({gallery.flex.menuTitle} && {image.properties.title}) || ({gallery.flex.menuDescription} && {image.properties.description}) || ({gallery.flex.menuCopyright} && {image.properties.copyright})">
        <div class="ot-gallery-menu dropdown">
            <button type="button"
                    class="ot-gallery-menu-btn dropdown-toggle"
                    data-bs-toggle="dropdown"
                    data-bs-boundary="viewport"
                    aria-expanded="false"
                    aria-label="{f:translate(key: 'LLL:EXT:ot_gallery/Resources/Private/Language/locallang.xlf:gallery.menu.label')}: {image.properties.title}">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
                    <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                </svg>
            </button>
            <ul class="ot-gallery-menu-list dropdown-menu dropdown-menu-end">

                <f:if condition="{gallery.flex.enableDownload}">
                    <li>
                        <a class="dropdown-item ot-gallery-menu-download"
                           href="{image.publicUrl}"
                           download="{image.properties.title}">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" focusable="false">
                                <path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5z"/>
                            </svg>
                            <f:translate key="LLL:EXT:ot_gallery/Resources/Private/Language/locallang.xlf:gallery.download.image" />
                        </a>
                    </li>
                </f:if>

                <f:if condition="{gallery.flex.enableDownload} && (({gallery.flex.menuTitle} && {image.properties.title}) || ({gallery.flex.menuDescription} && {image.properties.description}) || ({gallery.flex.menuCopyright} && {image.properties.copyright}))">
                    <li><hr class="dropdown-divider" /></li>
                </f:if>

                <f:if condition="{gallery.flex.menuTitle} && {image.properties.title}">
                    <li>
                        <span class="dropdown-item-text ot-gallery-menu-title">
                            {image.properties.title}
                        </span>
                    </li>
                </f:if>

                <f:if condition="{gallery.flex.menuDescription} && {image.properties.description}">
                    <li>
                        <span class="dropdown-item-text ot-gallery-menu-description">
                            {image.properties.description}
                        </span>
                    </li>
                </f:if>

                <f:if condition="{gallery.flex.menuCopyright} && {image.properties.copyright}">
                    <li>
                        <span class="dropdown-item-text ot-gallery-menu-copyright">
                            &copy; {image.properties.copyright}
                        </span>
                    </li>
                </f:if>

            </ul>
        </div>
    </f:if>

    <f:if condition="({gallery.flex.figcaptionTitle} && {image.properties.title}) || ({gallery.flex.figcaptionDescription} && {image.properties.description}) || ({gallery.flex.figcaptionCopyright} && {image.properties.copyright})">
        <f:variable name="figcaptionClass" value="ot-gallery-caption" />
        <f:if condition="{gallery.flex.figcaptionVisuallyHidden}">
            <f:variable name="figcaptionClass" value="ot-gallery-caption visually-hidden" />
        </f:if>
        <figcaption class="{figcaptionClass}">
            <f:render partial="Gallery/Metadata"
                      arguments="{
                          image: image,
                          showTitle: gallery.flex.figcaptionTitle,
                          showDescription: gallery.flex.figcaptionDescription,
                          showCopyright: gallery.flex.figcaptionCopyright
                      }" />
        </figcaption>
    </f:if>

</figure>

</html>
